<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intake Received | Death Row Diner</title>
  <meta name="description" content="Death Row Diner visitor intake received." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Inter:wght@300;400;500;700;900&display=swap');

    :root {
      --cream: #e8dcc9;
      --muted: #8f877b;
      --red: #c9362b;
      --yellow: #b9952e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 28px;
      color: var(--cream);
      background:
        radial-gradient(circle at 50% -10%, rgba(201, 54, 43, 0.18), transparent 40%),
        linear-gradient(180deg, #030303 0%, #090909 45%, #050505 100%);
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 4px);
    }

    main {
      width: min(760px, 100%);
      padding: clamp(34px, 7vw, 72px);
      border: 1px solid rgba(232, 220, 201, 0.14);
      background: rgba(13, 10, 9, 0.92);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.75);
      position: relative;
    }

    .notice {
      font-family: "Bebas Neue", sans-serif;
      color: var(--red);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-size: 14px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(54px, 9vw, 104px);
      line-height: 0.95;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0;
    }

    .rule {
      width: 130px;
      height: 1px;
      margin: 34px auto 28px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      position: relative;
    }

    .rule::after {
      content: "";
      width: 5px;
      height: 5px;
      background: var(--red);
      position: absolute;
      left: 50%;
      top: -2px;
      transform: translateX(-50%) rotate(45deg);
    }

    p {
      font-family: "Special Elite", monospace;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 22px);
      line-height: 1.9;
      margin: 0;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 42px;
      min-width: 190px;
      height: 58px;
      padding: 0 28px;
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      background: var(--red);
      color: white;
      text-decoration: none;
    }

    .seal {
      margin-top: 28px;
      font-family: "Bebas Neue", sans-serif;
      color: var(--yellow);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main>
    <div class="notice">Form DRD-01 — Visitor Intake</div>
    <h1>Intake<br />Received</h1>
    <div class="rule"></div>
    <p>
      Your record has been placed on file.<br />
      Await further instructions.
    </p>
    <a href="/">Return to the File</a>
    <div class="seal">Sealed</div>
  </main>
</body>
</html>
